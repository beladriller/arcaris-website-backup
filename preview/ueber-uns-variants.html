<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Arcaris — Über uns: 5 Design-Varianten</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../css/main.css">
<style>
/* ==========================================================================
   BASE
   ========================================================================== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "roboto_slablight", "Roboto Slab", Georgia, serif;
  color: #1a1a1a;
  background: #fff;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }

/* Switcher */
.variant-switcher {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 9999;
  display: flex; gap: 4px; padding: 6px 8px; border-radius: 999px;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.1), 0 1px 0 rgba(0,0,0,0.04);
}
.variant-switcher button {
  appearance: none; border: 0; background: transparent; color: #1a1a1a;
  font: 12px/1 "roboto_slabregular","Roboto Slab",sans-serif; letter-spacing: 2px;
  padding: 9px 14px; border-radius: 999px; cursor: pointer; text-transform: uppercase;
  opacity: 0.55; transition: background .2s, opacity .2s, color .2s;
  white-space: nowrap;
}
.variant-switcher button:hover { opacity: 1; }
.variant-switcher button.active { background: #00458c; color: #fff; opacity: 1; }

.variant-label {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
  padding: 10px 18px; border-radius: 999px; background: rgba(0,0,0,0.72); color: #fff;
  font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 3px; text-transform: uppercase;
  backdrop-filter: blur(8px);
}

/* Variant containers */
.variant { display: none; min-height: 100vh; padding-top: 80px; }
.variant.active { display: block; animation: fadeIn .35s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* Shared primitives (consistent with Arcaris CI) */
.kicker { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 5px; text-transform: uppercase; color: #00458c; margin: 0 0 16px; }
.hairline { width: 80px; height: 1px; background: #00458c; border: 0; margin: 0 0 28px; }
.h2 { font-family: "roboto_slablight","Roboto Slab",Georgia,serif; font-weight: 300; font-size: 48px; line-height: 1.15; margin: 0 0 32px; color: #1a1a1a; letter-spacing: -0.5px; }
.h3 { font-family: "roboto_slabregular","Roboto Slab",Georgia,serif; font-weight: 400; font-size: 22px; line-height: 1.3; margin: 0 0 14px; color: #00458c; }
.lead { font-size: 22px; line-height: 1.55; color: #2a313a; max-width: 62ch; margin: 0 0 24px; font-weight: 300; }
.body { font-size: 16px; line-height: 1.75; color: #3b4148; max-width: 66ch; margin: 0 0 20px; }

/* ==========================================================================
   V1 — PINNED SCROLL STORY
   ========================================================================== */
.v1 { background: #fff; }
.v1-stage { display: grid; grid-template-columns: 1fr 1fr; gap: 0; max-width: none; }
.v1-visual {
  position: sticky; top: 0; height: 100vh; overflow: hidden;
  background: #0a1528;
}
.v1-visual-layer {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0; transform: scale(1.05);
  transition: opacity 1s ease, transform 2.4s ease;
}
.v1-visual-layer.active { opacity: 1; transform: scale(1); }
.v1-visual-layer::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.2) 50%, rgba(0,10,30,0.6) 100%);
}
.v1-chapter-num {
  position: absolute; top: 50%; left: 50px; transform: translateY(-50%);
  color: rgba(255,255,255,0.18);
  font-family: "roboto_slablight",serif; font-weight: 300; font-size: 260px; line-height: 1;
  letter-spacing: -8px; pointer-events: none; transition: opacity .6s ease;
}
.v1-content { }
.v1-intro { padding: 120px 70px 100px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid rgba(0,0,0,0.06); }
.v1-act { padding: 120px 70px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid rgba(0,0,0,0.06); }
.v1-act:last-child { border-bottom: 0; }
.v1-act .kicker-small { font: 10px/1 "roboto_slabregular",sans-serif; letter-spacing: 4px; text-transform: uppercase; color: #9aa3b0; margin-bottom: 14px; }

/* ==========================================================================
   V2 — FLIP CARDS (Family-Office CI, warmes Farbschema)
   ========================================================================== */
.v2 { background: #f5f2ec; padding-bottom: 140px; color: #2b2620; }
.v2-header { max-width: 1240px; margin: 0 auto; padding: 140px 40px 70px; }
.v2-header .kicker {
  font-family: "roboto_slabregular","Roboto Slab",Georgia,serif;
  font-size: 12px; letter-spacing: 5px; text-transform: uppercase;
  color: #8b5a2b; margin: 0 0 22px; font-weight: 400;
}
.v2-header .hairline { width: 100px; height: 1px; background: #8b5a2b; opacity: 0.4; border: 0; margin: 0 0 36px; }

.v2-headline-row {
  display: flex; align-items: center; gap: 36px;
  margin: 0 0 32px;
}
.v2-headline-row h2 {
  font-family: "roboto_slablight","Roboto Slab",Georgia,serif;
  font-weight: 300; font-size: 52px; line-height: 1.18;
  color: #2b2620; font-style: italic; margin: 0;
  letter-spacing: -0.3px;
}
.v2-eagle {
  flex: 0 0 auto;
  width: 62px; height: 56px;
  background-image: url('../img/arcaris_adler_schwarz.png');
  background-repeat: no-repeat;
  background-size: contain;
  background-position: center;
  opacity: 0.92;
}

.v2-lead {
  font-family: "roboto_slablight","Roboto Slab",Georgia,serif;
  font-size: 22px; line-height: 1.55; color: #2b2620;
  margin: 0 0 14px; max-width: 72ch; font-weight: 300;
}
.v2-hint {
  margin-top: 28px;
  font: 11px/1 "roboto_slabregular","Roboto Slab",Georgia,serif;
  letter-spacing: 3px; text-transform: uppercase; color: rgba(139, 90, 43, 0.7);
}

.v2-grid { max-width: 1240px; margin: 0 auto; padding: 0 40px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.v2-card {
  perspective: 1600px; min-height: 420px;
}
.v2-card-inner {
  position: relative; width: 100%; height: 100%; min-height: 420px;
  transition: transform 1.15s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}
/* Hover = vollständiger Flip + leichter Lift */
.v2-card:hover .v2-card-inner { transform: translateY(-6px) rotateY(180deg); }

.v2-face {
  position: absolute; inset: 0;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: 4px;
  padding: 40px 34px; display: flex; flex-direction: column;
  transition: box-shadow .3s ease, background .3s ease, border-color .3s ease;
}
.v2-face-front {
  background: rgba(255, 255, 255, 0.55);
  border: 1px solid rgba(139, 90, 43, 0.15);
  justify-content: space-between;
}
.v2-card:hover .v2-face-front {
  background: rgba(255, 255, 255, 0.82);
  border-color: rgba(139, 90, 43, 0.32);
  box-shadow: 0 14px 42px rgba(139, 90, 43, 0.12);
}
.v2-face-back {
  transform: rotateY(180deg);
  background: #2b2620; color: #f5f2ec;
  border: 1px solid #2b2620;
  overflow-y: auto;
  /* Minimalistische Scrollbar (Firefox) */
  scrollbar-width: thin;
  scrollbar-color: rgba(201, 168, 122, 0.35) transparent;
}
/* Minimalistische Scrollbar (WebKit / Chromium / Edge / Safari) */
.v2-face-back::-webkit-scrollbar { width: 4px; }
.v2-face-back::-webkit-scrollbar-track { background: transparent; }
.v2-face-back::-webkit-scrollbar-thumb {
  background: rgba(201, 168, 122, 0.3);
  border-radius: 2px;
  transition: background 0.3s ease;
}
.v2-face-back:hover::-webkit-scrollbar-thumb { background: rgba(201, 168, 122, 0.55); }
.v2-face-back::-webkit-scrollbar-thumb:hover { background: rgba(201, 168, 122, 0.75); }

.v2-num {
  font-family: "roboto_slablight","Roboto Slab",Georgia,serif;
  font-weight: 300; font-size: 56px; line-height: 1;
  color: #8b5a2b; opacity: 0.7; margin: 0;
  font-style: italic; letter-spacing: -1.5px;
}
.v2-face-back .v2-num {
  color: #c9a87a; opacity: 0.8; font-size: 36px; margin: 0 0 14px;
}

.v2-card-body-group { display: flex; flex-direction: column; }

.v2-card-title {
  font-family: "roboto_slabregular","Roboto Slab",Georgia,serif;
  font-size: 15px; letter-spacing: 2px; text-transform: uppercase;
  color: #2b2620; margin: 0 0 18px; font-weight: 400;
}
.v2-face-back .v2-card-title { color: #f5f2ec; margin-bottom: 18px; }

.v2-card-short {
  font-family: "roboto_slablight","Roboto Slab",Georgia,serif;
  font-size: 19px; line-height: 1.5; color: #2b2620;
  margin: 0; font-weight: 300;
}
.v2-face-back .v2-body {
  font-family: "roboto_slablight","Roboto Slab",Georgia,serif;
  color: rgba(245, 242, 236, 0.88); font-size: 14px; line-height: 1.75;
  font-weight: 300;
}

.v2-flip-hint {
  font: 11px/1 "roboto_slabregular","Roboto Slab",Georgia,serif;
  letter-spacing: 3px; text-transform: uppercase;
  color: #8b5a2b; display: flex; align-items: center; gap: 12px;
  transition: gap .3s ease, color .3s ease;
}
.v2-flip-hint-line {
  width: 22px; height: 1px; background: currentColor;
  transition: width .3s ease;
  display: inline-block;
}
.v2-flip-hint-chevron {
  width: 7px; height: 7px;
  border-top: 1px solid currentColor;
  border-right: 1px solid currentColor;
  transform: rotate(45deg);
  display: inline-block;
  transition: transform .3s ease;
  margin-left: -4px;
}
.v2-card:hover .v2-flip-hint { gap: 14px; }
.v2-card:hover .v2-flip-hint-line { width: 34px; }
.v2-card:hover .v2-flip-hint-chevron { transform: rotate(45deg) translate(2px, -2px); }
.v2-face-back .v2-flip-hint { color: rgba(201, 168, 122, 0.85); }

/* ==========================================================================
   V3 — TABS / SEGMENTED
   ========================================================================== */
.v3 { background: #fff; padding-bottom: 140px; }
.v3-inner { max-width: 1080px; margin: 0 auto; padding: 100px 40px 0; }
.v3-lead-block { margin-bottom: 80px; }
.v3-tabs {
  display: flex; gap: 0; border-bottom: 1px solid rgba(0, 69, 140, 0.15);
  position: relative; margin-bottom: 60px;
}
.v3-tab {
  appearance: none; background: transparent; border: 0; cursor: pointer;
  padding: 22px 34px 22px 0; margin-right: 48px;
  font: 13px/1 "roboto_slabregular",serif; letter-spacing: 3px; text-transform: uppercase;
  color: #9aa3b0; transition: color .3s ease;
}
.v3-tab:hover { color: #00458c; }
.v3-tab.active { color: #00458c; }
.v3-tab-indicator {
  position: absolute; bottom: -1px; left: 0; height: 2px; background: #00458c;
  transition: transform .45s cubic-bezier(.4,0,.2,1), width .45s cubic-bezier(.4,0,.2,1);
}
.v3-panels { position: relative; min-height: 420px; }
.v3-panel {
  position: absolute; inset: 0; opacity: 0; pointer-events: none;
  transform: translateY(12px); transition: opacity .45s ease, transform .45s ease;
}
.v3-panel.active { opacity: 1; pointer-events: auto; transform: none; position: relative; }
.v3-panel-meta {
  display: flex; gap: 40px; margin-bottom: 36px; padding-bottom: 28px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}
.v3-meta-item { flex: 1; }
.v3-meta-num { font-family: "roboto_slablight",serif; font-weight: 300; font-size: 34px; color: #00458c; line-height: 1; margin-bottom: 8px; letter-spacing: -1px; }
.v3-meta-label { font: 10px/1.4 "roboto_slabregular",sans-serif; letter-spacing: 2px; text-transform: uppercase; color: #6b7280; }

/* ==========================================================================
   V4 — SPLIT-SCREEN ALTERNIEREND
   ========================================================================== */
.v4 { background: #fff; }
.v4-header { max-width: 1280px; margin: 0 auto; padding: 100px 40px 60px; }
.v4-split {
  display: grid; grid-template-columns: 1fr 1fr; min-height: 620px;
  align-items: stretch; max-width: 1600px; margin: 0 auto;
}
.v4-split.reverse { direction: rtl; }
.v4-split.reverse > * { direction: ltr; }
.v4-visual {
  background-size: cover; background-position: center;
  position: relative; overflow: hidden;
  opacity: 0; transform: translateX(-40px); transition: opacity 1s ease, transform 1.2s ease;
}
.v4-split.reverse .v4-visual { transform: translateX(40px); }
.v4-visual.in { opacity: 1; transform: none; }
.v4-visual::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,69,140,0.15), rgba(0,0,0,0));
}
.v4-text {
  padding: 80px 70px; display: flex; flex-direction: column; justify-content: center;
  opacity: 0; transform: translateY(30px); transition: opacity 1s ease .15s, transform 1s ease .15s;
}
.v4-text.in { opacity: 1; transform: none; }
.v4-num-big {
  font-family: "roboto_slablight",serif; font-weight: 300; font-size: 14px;
  letter-spacing: 6px; text-transform: uppercase; color: #00458c; margin-bottom: 20px;
  display: flex; align-items: center; gap: 16px;
}
.v4-num-big::after { content: ""; width: 60px; height: 1px; background: #00458c; }

/* ==========================================================================
   V5 — STATS BANNER + PRINZIPIEN-GRID
   ========================================================================== */
.v5 { background: #fff; padding-bottom: 140px; }
.v5-hero {
  background: linear-gradient(135deg, #00325f 0%, #00458c 60%, #0081bf 110%);
  color: #fff; padding: 110px 40px 80px; position: relative; overflow: hidden;
}
.v5-hero::before {
  content: ""; position: absolute; top: -20%; right: -10%; width: 60%; height: 140%;
  background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.v5-hero-inner { max-width: 1280px; margin: 0 auto; position: relative; }
.v5-hero .kicker { color: rgba(255,255,255,0.7); }
.v5-hero .h2 { color: #fff; max-width: 20ch; }
.v5-hero .hairline { background: rgba(255,255,255,0.5); }
.v5-lead { font-size: 20px; line-height: 1.55; max-width: 72ch; color: rgba(255,255,255,0.92); font-weight: 300; margin: 24px 0 60px; }

.v5-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px solid rgba(255,255,255,0.2); }
.v5-stat { padding: 40px 24px 0 0; border-right: 1px solid rgba(255,255,255,0.14); }
.v5-stat:last-child { border-right: 0; }
.v5-stat-num {
  font-family: "roboto_slablight",serif; font-weight: 300; font-size: 56px; line-height: 1;
  letter-spacing: -1.5px; margin: 0 0 14px;
}
.v5-stat-num .unit { font-size: 26px; margin-left: 4px; opacity: 0.75; }
.v5-stat-label { font: 11px/1.45 "roboto_slabregular",sans-serif; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.75); max-width: 20ch; }

.v5-grid-wrap { max-width: 1280px; margin: 0 auto; padding: 100px 40px 0; }
.v5-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
  background: rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.08);
}
.v5-cell { background: #fff; padding: 44px 36px; transition: background .3s ease, transform .3s ease; position: relative; }
.v5-cell:hover { background: #f7f9fc; }
.v5-cell-icon {
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(0, 69, 140, 0.08); color: #00458c;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 22px;
}
.v5-cell-icon svg { width: 22px; height: 22px; }
.v5-cell h4 { font-family: "roboto_slabregular",serif; font-size: 17px; font-weight: 400; color: #1a1a1a; margin: 0 0 12px; }
.v5-cell p { font-size: 14px; line-height: 1.7; color: #4b5563; margin: 0; }

.v5-quote {
  max-width: 1000px; margin: 100px auto 0; padding: 0 40px; text-align: center;
}
.v5-quote blockquote {
  font-family: "roboto_slablight",serif; font-weight: 300; font-size: 32px; line-height: 1.4;
  color: #00458c; margin: 0; letter-spacing: -0.3px;
}
.v5-quote blockquote::before { content: "„"; font-size: 1em; color: rgba(0, 69, 140, 0.35); margin-right: 4px; }
.v5-quote blockquote::after { content: "\""; font-size: 1em; color: rgba(0, 69, 140, 0.35); }

/* ==========================================================================
   RESPONSIVE
   ========================================================================== */
@media (max-width: 1100px) {
  .v2-grid { grid-template-columns: 1fr; }
  .v2-card { min-height: 360px; }
  .v2-card-inner { min-height: 360px; }
  .v5-stats { grid-template-columns: repeat(2, 1fr); }
  .v5-stat { border-bottom: 1px solid rgba(255,255,255,0.14); }
  .v5-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 780px) {
  .v1-stage { grid-template-columns: 1fr; }
  .v1-visual { position: relative; height: 60vh; }
  .v1-chapter-num { font-size: 160px; left: 24px; }
  .v1-act, .v1-intro { padding: 70px 30px; min-height: auto; }
  .v4-split { grid-template-columns: 1fr; min-height: auto; }
  .v4-visual { min-height: 340px; }
  .v4-text { padding: 60px 30px; }
  .v5-stats { grid-template-columns: 1fr; }
  .v5-grid { grid-template-columns: 1fr; }
  .h2 { font-size: 34px; }
  .v3-tab { padding: 18px 0; margin-right: 22px; font-size: 11px; letter-spacing: 2px; }
  .variant-switcher { gap: 2px; padding: 4px; }
  .variant-switcher button { padding: 7px 10px; font-size: 11px; letter-spacing: 1px; }
}
</style>
</head>
<body>

<nav class="variant-switcher" role="tablist">
  <button data-v="v1" role="tab">1 · Pinned Scroll</button>
  <button data-v="v2" role="tab">2 · Flip Cards</button>
  <button data-v="v3" role="tab">3 · Tabs</button>
  <button data-v="v4" role="tab">4 · Split</button>
  <button data-v="v5" role="tab">5 · Stats Grid</button>
</nav>

<div class="variant-label" id="variantLabel"></div>

<main>
  <section class="variant" data-name="v1"></section>
  <section class="variant" data-name="v2"></section>
  <section class="variant" data-name="v3"></section>
  <section class="variant" data-name="v4"></section>
  <section class="variant" data-name="v5"></section>
</main>

/* ==========================================================================
   MOUNT
   ========================================================================== */
Object.keys(R).forEach(k => {
  const el = document.querySelector(`.variant[data-name="${k}"]`);
  if (el) {
    el.classList.add(k);
    el.innerHTML = R[k]();
  }
});

const LABELS = {
  v1: "Variante 1 · Pinned Scroll-Story",
  v2: "Variante 2 · Flip-Karten",
  v3: "Variante 3 · Tab-Interface",
  v4: "Variante 4 · Split-Screen alternierend",
  v5: "Variante 5 · Kennzahlen + Prinzipien-Grid"
};

const buttons = document.querySelectorAll('.variant-switcher button');
const variants = document.querySelectorAll('.variant');
const label = document.getElementById('variantLabel');

function setVariant(v) {
  buttons.forEach(b => b.classList.toggle('active', b.dataset.v === v));
  variants.forEach(s => s.classList.toggle('active', s.dataset.name === v));
  label.textContent = LABELS[v] || v;
  history.replaceState(null, '', '#' + v);
  window.scrollTo({ top: 0, behavior: 'instant' });
  initVariantInteractions(v);
}

buttons.forEach(b => b.addEventListener('click', () => setVariant(b.dataset.v)));

/* ==========================================================================
   PER-VARIANT INTERACTIONS
   ========================================================================== */
let v1Observer, v4Observer;

function initVariantInteractions(v) {
  if (v1Observer) { v1Observer.disconnect(); v1Observer = null; }
  if (v4Observer) { v4Observer.disconnect(); v4Observer = null; }

  if (v === 'v1') {
    // Cross-fade background layers as chapters enter the viewport
    const layers = document.querySelectorAll('#v1Visual .v1-visual-layer');
    const acts = document.querySelectorAll('.v1 [data-act]');
    v1Observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const idx = parseInt(e.target.dataset.act, 10);
          const activeLayer = idx < 0 ? 0 : idx;
          layers.forEach((l, i) => l.classList.toggle('active', i === activeLayer));
        }
      });
    }, { threshold: 0.55 });
    acts.forEach(a => v1Observer.observe(a));
  }

  // V2 uses CSS :hover to flip — no JS handler needed

  if (v === 'v3') {
    const tabs = document.querySelectorAll('.v3-tab');
    const panels = document.querySelectorAll('.v3-panel');
    const indicator = document.querySelector('.v3-tab-indicator');
    function moveIndicator(activeTab) {
      const rect = activeTab.getBoundingClientRect();
      const parentRect = activeTab.parentElement.getBoundingClientRect();
      const width = activeTab.offsetWidth - 34; // subtract right padding
      indicator.style.width = width + 'px';
      indicator.style.transform = `translateX(${rect.left - parentRect.left}px)`;
    }
    const activeInitial = document.querySelector('.v3-tab.active');
    if (activeInitial) requestAnimationFrame(() => moveIndicator(activeInitial));
    tabs.forEach(t => {
      t.onclick = () => {
        tabs.forEach(x => x.classList.remove('active'));
        panels.forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.querySelector(`.v3-panel[data-panel="${t.dataset.tab}"]`).classList.add('active');
        moveIndicator(t);
      };
    });
  }

  if (v === 'v4') {
    const targets = document.querySelectorAll('.v4 [data-reveal]');
    v4Observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          v4Observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.2 });
    targets.forEach(t => v4Observer.observe(t));
  }

  if (v === 'v5') {
    // Count-up animation for numeric stats
    const numEls = document.querySelectorAll('.v5-stat-num');
    numEls.forEach(el => {
      const full = el.textContent;
      const match = full.match(/^(\d+[-–]?\d*)/);
      if (!match) return;
      const target = match[1];
      // Skip animation for ranges or non-numeric for simplicity
      if (target.includes('-') || target.includes('–')) return;
      const n = parseInt(target, 10);
      if (isNaN(n)) return;
      const suffix = full.slice(target.length);
      let start = null; const duration = 1100;
      el.textContent = "0" + suffix;
      const step = (ts) => {
        if (!start) start = ts;
        const p = Math.min((ts - start) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        el.innerHTML = Math.round(n * eased) + suffix;
        if (p < 1) requestAnimationFrame(step);
      };
      const io = new IntersectionObserver((es) => {
        es.forEach(e => { if (e.isIntersecting) { requestAnimationFrame(step); io.disconnect(); } });
      }, { threshold: 0.4 });
      io.observe(el);
    });
  }
}

/* ==========================================================================
   INIT
   ========================================================================== */
const initial = (location.hash || '#v1').slice(1);
setVariant(LABELS[initial] ? initial : 'v1');

window.addEventListener('keydown', (e) => {
  const order = Object.keys(LABELS);
  const current = order.indexOf(document.querySelector('.variant-switcher button.active').dataset.v);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') setVariant(order[(current+1)%order.length]);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') setVariant(order[(current-1+order.length)%order.length]);
});
