<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Arcaris — 10 Design-Vorlagen für die Gesamtseite</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../css/main.css">
<style>
/* ==========================================================================
   BASE RESET & SHARED
   ========================================================================== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { font-family: "roboto_slablight", "Roboto Slab", Georgia, serif; color: #1a1a1a; background: #fff; overflow-x: hidden; }
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }

/* Variant switcher */
.variant-switcher {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 9999;
  display: flex; gap: 4px; padding: 6px 8px; border-radius: 999px;
  background: rgba(255,255,255,0.94); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 0 rgba(0,0,0,0.04);
}
.variant-switcher button {
  appearance: none; border: 0; background: transparent; color: #1a1a1a;
  font: 12px/1 "roboto_slabregular","Roboto Slab",sans-serif; letter-spacing: 2px;
  padding: 8px 12px; border-radius: 999px; cursor: pointer; text-transform: uppercase;
  opacity: 0.55; transition: background .2s, opacity .2s, color .2s;
}
.variant-switcher button:hover { opacity: 1; }
.variant-switcher button.active { background: #00458c; color: #fff; opacity: 1; }

.variant-label {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
  padding: 10px 18px; border-radius: 999px; background: rgba(0,0,0,0.72); color: #fff;
  font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 3px; text-transform: uppercase;
  backdrop-filter: blur(8px);
}

/* Variant containers */
.page-variant { display: none; animation: fadeIn .35s ease; padding-top: 80px; min-height: 100vh; }
.page-variant.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* Shared content primitives */
.pv-section { padding: 120px 40px; max-width: 1280px; margin: 0 auto; }
.pv-kicker { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 5px; text-transform: uppercase; color: #6b7280; margin: 0 0 18px; }
.pv-h2 { font-family: "roboto_slablight","Roboto Slab",Georgia,serif; font-weight: 300; font-size: 44px; line-height: 1.2; margin: 0 0 36px; color: #1a1a1a; }
.pv-p { font-size: 17px; line-height: 1.7; color: #3b4148; max-width: 68ch; margin: 0 0 18px; }
.pv-hairline { width: 80px; height: 1px; background: #00458c; border: 0; margin: 0 0 28px; }
.pv-hairline-wide { width: 100%; height: 1px; background: rgba(0,0,0,0.1); border: 0; margin: 0; }

/* ==========================================================================
   VARIANTE A — KLASSISCHE PRIVATBANK (Numeric Chapters)
   ========================================================================== */
.v-a { background: #fff; }
.v-a .chapter { display: grid; grid-template-columns: 200px 1fr; gap: 60px; padding: 120px 40px; max-width: 1280px; margin: 0 auto; border-top: 1px solid rgba(0,0,0,0.08); }
.v-a .chapter:first-child { border-top: 0; }
.v-a .num { font-family: "roboto_slablight",serif; font-weight: 300; font-size: 120px; line-height: 1; color: #00458c; opacity: 0.4; letter-spacing: -4px; }
.v-a .kicker { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 5px; text-transform: uppercase; color: #00458c; margin: 0 0 14px; }
.v-a h2 { font-family: "roboto_slablight",serif; font-weight: 300; font-size: 48px; line-height: 1.15; margin: 0 0 32px; color: #1a1a1a; }
.v-a h3 { font-family: "roboto_slabregular",serif; font-weight: 400; font-size: 20px; letter-spacing: 1px; margin: 40px 0 14px; color: #00458c; text-transform: uppercase; }
.v-a p { font-size: 16px; line-height: 1.75; color: #3b4148; max-width: 64ch; margin: 0 0 18px; }
.v-a .portfolio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-top: 24px; }
.v-a .portfolio-card { border-top: 1px solid rgba(0,0,0,0.08); padding-top: 24px; }
.v-a .portfolio-card img.photo { aspect-ratio: 4/3; object-fit: cover; margin-bottom: 20px; }
.v-a .portfolio-card .name { font-family: "roboto_slabregular",serif; font-size: 18px; letter-spacing: 1px; text-transform: uppercase; color: #00458c; margin: 0 0 6px; }
.v-a .portfolio-card .meta { font-size: 13px; color: #6b7280; line-height: 1.6; }
.v-a .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 60px; margin-top: 24px; }
.v-a .team-card img { aspect-ratio: 3/4; object-fit: cover; margin-bottom: 20px; filter: grayscale(10%); }
.v-a .team-card .name { font-family: "roboto_slablight",serif; font-size: 28px; font-weight: 300; margin: 0 0 4px; }
.v-a .team-card .role { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 4px; text-transform: uppercase; color: #00458c; margin: 0 0 16px; }
.v-a .cta-link { display: inline-block; font: 13px/1 "roboto_slabregular",sans-serif; letter-spacing: 3px; text-transform: uppercase; color: #00458c; border-bottom: 1px solid #00458c; padding-bottom: 6px; margin-top: 12px; }
.v-a .kontakt-block { font-size: 16px; line-height: 1.8; color: #3b4148; }
.v-a .map-placeholder { aspect-ratio: 16/9; background: #e5e7eb; border: 1px solid rgba(0,0,0,0.08); margin-top: 32px; display: flex; align-items: center; justify-content: center; color: #6b7280; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }

/* ==========================================================================
   VARIANTE B — EDITORIAL MAGAZINE (Großtypografie)
   ========================================================================== */
.v-b { background: #fff; }
.v-b section { padding: 140px 40px; max-width: 1400px; margin: 0 auto; }
.v-b .kicker { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 6px; text-transform: uppercase; color: #00458c; margin: 0 0 24px; }
.v-b h2 { font-family: "roboto_slabregular",serif; font-weight: 400; font-size: clamp(56px, 9vw, 128px); line-height: 0.92; letter-spacing: -3px; margin: 0 0 80px; color: #1a1a1a; text-transform: none; }
.v-b .lead { font-family: "roboto_slablight",serif; font-size: 24px; line-height: 1.4; color: #1a1a1a; max-width: 720px; margin: 0 0 60px; font-weight: 300; }
.v-b .cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
.v-b .cols-2 p { font-size: 15px; line-height: 1.8; color: #4b5563; }
.v-b .pullquote { font-family: "roboto_slablight",serif; font-size: 40px; line-height: 1.25; font-weight: 300; color: #00458c; text-align: center; padding: 80px 40px; border-top: 1px solid rgba(0,0,0,0.1); border-bottom: 1px solid rgba(0,0,0,0.1); margin: 80px 0; font-style: italic; }
.v-b .portfolio-editorial { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.v-b .portfolio-editorial .item { position: relative; aspect-ratio: 1; overflow: hidden; }
.v-b .portfolio-editorial .item img { width: 100%; height: 100%; object-fit: cover; transition: transform 4s ease; }
.v-b .portfolio-editorial .item:hover img { transform: scale(1.05); }
.v-b .portfolio-editorial .caption { position: absolute; inset: auto 0 0 0; padding: 18px; background: linear-gradient(transparent, rgba(0,0,0,0.75)); color: #fff; }
.v-b .portfolio-editorial .caption .name { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 3px; text-transform: uppercase; margin: 0 0 4px; }
.v-b .portfolio-editorial .caption .meta { font-size: 11px; opacity: 0.85; }
.v-b .team-ed { display: grid; grid-template-columns: repeat(2,1fr); gap: 0; }
.v-b .team-ed .card { padding: 40px; border: 1px solid rgba(0,0,0,0.08); }
.v-b .team-ed .card:first-child { border-right: 0; }
.v-b .team-ed img { width: 160px; height: 200px; object-fit: cover; margin-bottom: 32px; }
.v-b .team-ed .name { font-family: "roboto_slablight",serif; font-size: 36px; font-weight: 300; margin: 0 0 6px; }
.v-b .team-ed .role { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 4px; text-transform: uppercase; color: #00458c; margin: 0 0 24px; }
.v-b .team-ed .bio { font-size: 14px; line-height: 1.7; color: #4b5563; }

/* ==========================================================================
   VARIANTE C — STICKY-LABEL DOKUMENT
   ========================================================================== */
.v-c { background: #fafafa; }
.v-c .doc { display: grid; grid-template-columns: 260px 1fr; gap: 80px; max-width: 1280px; margin: 0 auto; padding: 80px 40px; }
.v-c .toc { position: sticky; top: 120px; align-self: start; border-left: 1px solid #00458c; padding-left: 20px; }
.v-c .toc .brand { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 4px; text-transform: uppercase; color: #00458c; margin: 0 0 24px; }
.v-c .toc ol { list-style: none; padding: 0; margin: 0; counter-reset: tocitem; }
.v-c .toc li { counter-increment: tocitem; font-size: 13px; line-height: 2.2; color: #6b7280; }
.v-c .toc li::before { content: counter(tocitem, upper-roman) ". "; color: #00458c; margin-right: 6px; font-family: "roboto_slabregular",serif; }
.v-c .body { padding-bottom: 80px; }
.v-c .body section { margin-bottom: 100px; }
.v-c .body .kicker { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 4px; text-transform: uppercase; color: #00458c; margin: 0 0 12px; }
.v-c .body h2 { font-family: "roboto_slablight",serif; font-weight: 300; font-size: 40px; line-height: 1.2; margin: 0 0 24px; }
.v-c .body p { font-size: 16px; line-height: 1.75; color: #374151; max-width: 62ch; margin: 0 0 18px; }
.v-c .body h3 { font-family: "roboto_slabregular",serif; font-size: 15px; letter-spacing: 2px; text-transform: uppercase; color: #00458c; margin: 40px 0 12px; }
.v-c .portfolio-list { margin-top: 28px; }
.v-c .portfolio-row { display: grid; grid-template-columns: 120px 1fr auto; gap: 24px; padding: 24px 0; border-top: 1px solid rgba(0,0,0,0.08); align-items: center; }
.v-c .portfolio-row img { aspect-ratio: 4/3; object-fit: cover; width: 120px; }
.v-c .portfolio-row .name { font-family: "roboto_slabregular",serif; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: #00458c; margin: 0 0 4px; }
.v-c .portfolio-row .meta { font-size: 13px; color: #6b7280; }
.v-c .portfolio-row .year { font-family: "roboto_slablight",serif; font-size: 28px; color: #00458c; opacity: 0.5; }
.v-c .team-doc { display: grid; grid-template-columns: repeat(2,1fr); gap: 48px; margin-top: 24px; }
.v-c .team-doc img { aspect-ratio: 1; object-fit: cover; width: 140px; border-radius: 50%; margin-bottom: 18px; }
.v-c .team-doc .name { font-family: "roboto_slablight",serif; font-size: 24px; font-weight: 300; margin: 0 0 4px; }
.v-c .team-doc .role { font: 10px/1 "roboto_slabregular",sans-serif; letter-spacing: 3px; text-transform: uppercase; color: #00458c; margin: 0 0 16px; }
.v-c .cta-link { display: inline-block; font: 12px/1 "roboto_slabregular",sans-serif; letter-spacing: 3px; text-transform: uppercase; color: #00458c; border-bottom: 1px solid #00458c; padding-bottom: 4px; margin-top: 12px; }

/* ==========================================================================
   VARIANTE D — MINIMAL SWISS GRID
   ========================================================================== */
.v-d { background: #fff; font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif; }
.v-d section { padding: 100px 40px; max-width: 1280px; margin: 0 auto; border-top: 1px solid #e5e7eb; }
.v-d section:first-child { border-top: 0; }
.v-d .grid-12 { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
.v-d .kicker { grid-column: 1 / span 2; font: 10px/1.5 "Inter",sans-serif; letter-spacing: 3px; text-transform: uppercase; color: #00458c; }
.v-d .kicker .num { color: #9ca3af; display: block; margin-bottom: 4px; }
.v-d h2 { grid-column: 3 / span 7; font-family: "Inter",sans-serif; font-weight: 500; font-size: 40px; line-height: 1.15; letter-spacing: -1px; margin: 0 0 40px; color: #0a0a0a; }
.v-d .body-col { grid-column: 3 / span 6; }
.v-d .body-col p { font: 15px/1.7 "Inter",sans-serif; color: #3f3f46; margin: 0 0 16px; }
.v-d .body-col h3 { font-family: "Inter",sans-serif; font-weight: 500; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; margin: 32px 0 12px; color: #00458c; }
.v-d .side-label { grid-column: 10 / span 3; }
.v-d .side-label .line { width: 40px; height: 2px; background: #00458c; margin-bottom: 16px; }
.v-d .side-label p { font: 12px/1.6 "Inter",sans-serif; color: #6b7280; }
.v-d .portfolio-swiss { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-top: 40px; }
.v-d .portfolio-swiss .item { }
.v-d .portfolio-swiss img { aspect-ratio: 1; object-fit: cover; margin-bottom: 12px; filter: grayscale(30%); transition: filter .3s; }
.v-d .portfolio-swiss .item:hover img { filter: grayscale(0); }
.v-d .portfolio-swiss .name { font: 11px/1.4 "Inter",sans-serif; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: #0a0a0a; margin: 0 0 4px; }
.v-d .portfolio-swiss .meta { font: 11px/1.4 "Inter",sans-serif; color: #9ca3af; }
.v-d .team-swiss { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(2,1fr); gap: 40px; margin-top: 32px; }
.v-d .team-swiss img { aspect-ratio: 4/5; object-fit: cover; margin-bottom: 16px; filter: grayscale(100%); transition: filter .4s; }
.v-d .team-swiss .card:hover img { filter: grayscale(0); }
.v-d .team-swiss .name { font: 20px/1.3 "Inter",sans-serif; font-weight: 500; margin: 0 0 4px; }
.v-d .team-swiss .role { font: 11px/1 "Inter",sans-serif; letter-spacing: 2px; text-transform: uppercase; color: #00458c; margin: 0 0 14px; }
.v-d .team-swiss .bio { font: 13px/1.7 "Inter",sans-serif; color: #4b5563; }
.v-d .cta-link { display: inline-block; font: 12px/1 "Inter",sans-serif; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #00458c; border-bottom: 1px solid #00458c; padding-bottom: 4px; }

/* ==========================================================================
   VARIANTE E — DARK LUXUS
   ========================================================================== */
.v-e { background: #0a1528; color: #e8ecef; }
.v-e section { padding: 130px 40px; max-width: 1280px; margin: 0 auto; border-top: 1px solid rgba(255,255,255,0.08); }
.v-e section:first-child { border-top: 0; }
.v-e .kicker { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 6px; text-transform: uppercase; color: #c9a961; margin: 0 0 20px; }
.v-e .hairline { width: 60px; height: 1px; background: #c9a961; border: 0; margin: 0 0 30px; }
.v-e h2 { font-family: "roboto_slablight",serif; font-weight: 300; font-size: 48px; line-height: 1.15; margin: 0 0 40px; color: #fff; }
.v-e p { font-size: 16px; line-height: 1.8; color: #b4bdc6; max-width: 62ch; margin: 0 0 18px; }
.v-e h3 { font-family: "roboto_slabregular",serif; font-weight: 400; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #c9a961; margin: 40px 0 14px; }
.v-e .three-col { display: grid; grid-template-columns: repeat(3,1fr); gap: 60px; margin-top: 40px; }
.v-e .three-col .num { font-family: "roboto_slablight",serif; font-size: 60px; line-height: 1; color: #c9a961; opacity: 0.8; margin: 0 0 16px; }
.v-e .three-col h4 { font-family: "roboto_slabregular",serif; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; color: #fff; margin: 0 0 12px; }
.v-e .three-col p { font-size: 14px; line-height: 1.7; color: #9aa4af; }
.v-e .portfolio-dark { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; margin-top: 40px; }
.v-e .portfolio-dark .item { position: relative; aspect-ratio: 1; overflow: hidden; background: #0f1d38; }
.v-e .portfolio-dark .item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.55; transition: opacity .5s; filter: grayscale(30%); }
.v-e .portfolio-dark .item:hover img { opacity: 0.95; }
.v-e .portfolio-dark .caption { position: absolute; inset: auto 24px 24px 24px; color: #fff; }
.v-e .portfolio-dark .name { font: 11px/1.3 "roboto_slabregular",sans-serif; letter-spacing: 3px; text-transform: uppercase; color: #c9a961; margin: 0 0 6px; }
.v-e .portfolio-dark .meta { font: 13px/1.5 "roboto_slablight",serif; color: #e8ecef; }
.v-e .team-dark { display: grid; grid-template-columns: repeat(2,1fr); gap: 60px; margin-top: 40px; }
.v-e .team-dark img { aspect-ratio: 3/4; object-fit: cover; margin-bottom: 24px; filter: grayscale(30%) brightness(0.92); }
.v-e .team-dark .name { font-family: "roboto_slablight",serif; font-size: 30px; font-weight: 300; color: #fff; margin: 0 0 6px; }
.v-e .team-dark .role { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 3px; text-transform: uppercase; color: #c9a961; margin: 0 0 18px; }
.v-e .team-dark .bio { font-size: 14px; line-height: 1.7; color: #9aa4af; }
.v-e .cta-link { display: inline-block; font: 12px/1 "roboto_slabregular",sans-serif; letter-spacing: 3px; text-transform: uppercase; color: #c9a961; border-bottom: 1px solid #c9a961; padding-bottom: 6px; margin-top: 12px; }
.v-e .kontakt-block { font-size: 16px; line-height: 1.9; color: #b4bdc6; }
.v-e .map-placeholder { aspect-ratio: 16/9; background: #0f1d38; border: 1px solid rgba(255,255,255,0.08); margin-top: 32px; display: flex; align-items: center; justify-content: center; color: #6b7280; font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 3px; text-transform: uppercase; }

/* ==========================================================================
   VARIANTE F — GEOMETRIC ARCHITECTURAL
   ========================================================================== */
.v-f { background: #fff; }
.v-f section { padding: 120px 40px; max-width: 1280px; margin: 0 auto; position: relative; }
.v-f section::before { content: ""; position: absolute; top: 80px; left: 40px; width: 18px; height: 18px; border: 1px solid #00458c; transform: rotate(45deg); }
.v-f .kicker { font: 11px/1 "roboto_slabregular",sans-serif; letter-spacing: 6px; text-transform: uppercase; color: #00458c; margin: 0 0 24px; padding-left: 80px; position: relative; }
.v-f .kicker::before { content: ""; position: absolute; left: 0; top: 50%; width: 60px; height: 1px; background: #00458c; }
.v-f h2 { font-family: "roboto_slablight",serif; font-weight: 300; font-size: 52px; line-height: 1.12; margin: 0 0 60px; color: #1a1a1a; padding-left: 80px; }
.v-f .grid-f { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 24px; align-items: start; }
.v-f .grid-f .axis { border-top: 1px solid #00458c; padding-top: 16px; font: 10px/1.4 "roboto_slabregular",sans-serif; letter-spacing: 2px; text-transform: uppercase; color: #00458c; }
.v-f .grid-f p { font-size: 15px; line-height: 1.8; color: #3b4148; margin: 0 0 16px; }
.v-f .grid-f h3 { font-family: "roboto_slabregular",serif; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: #00458c; margin: 0 0 12px; }
.v-f .principles { display: grid; grid-template-columns: repeat(3,1fr); gap: 40px; margin-top: 40px; padding-left: 80px; }
.v-f .principle { border-top: 2px solid #00458c; padding-top: 20px; position: relative; }
.v-f .principle .num { position: absolute; top: -18px; left: 0; background: #fff; padding: 0 12px 0 0; font-family: "roboto_slablight",serif; font-size: 14px; color: #00458c; letter-spacing: 2px; }
.v-f .principle h4 { font-family: "roboto_slabregular",serif; font-size: 15px; letter-spacing: 2px; text-transform: uppercase; color: #1a1a1a; margin: 0 0 12px; }
.v-f .principle p { font-size: 13px; line-height: 1.7; color: #4b5563; }
.v-f .portfolio-geo { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-top: 40px; padding-left: 80px; }
.v-f .portfolio-geo .item { border: 1px solid rgba(0,0,0,0.08); padding: 16px; transition: border-color .3s; }
.v-f .portfolio-geo .item:hover { border-color: #00458c; }
.v-f .portfolio-geo img { aspect-ratio: 4/3; object-fit: cover; margin-bottom: 16px; }
.v-f .portfolio-geo .name { font: 11px/1.3 "roboto_slabregular",sans-serif; letter-spacing: 2px; text-transform: uppercase; color: #00458c; margin: 0 0 6px; }
.v-f .portfolio-geo .meta { font: 12px/1.5 "roboto_slablight",serif; color: #6b7280; }
.v-f .team-geo { display: grid; grid-template-columns: repeat(2,1fr); gap: 60px; margin-top: 40px; padding-left: 80px; }
.v-f .team-geo .card { position: relative; }
.v-f .team-geo .card::before { content: ""; position: absolute; top: -20px; left: 0; width: 40px; height: 1px; background: #00458c; }
.v-f .team-geo img { aspect-ratio: 3/4; object-fit: cover; margin-bottom: 24px; }
.v-f .team-geo .name { font-family: "roboto_slablight",serif; font-size: 28px; font-weight: 300; margin: 0 0 4px; }

  </div>

/* ==========================================================================
   RENDER & SWITCHER
   ========================================================================== */
const labels = {
  a: 'A — Klassische Privatbank', b: 'B — Editorial Magazine', c: 'C — Sticky-Label Dokument',
  d: 'D — Minimal Swiss Grid', e: 'E — Dark Luxus', f: 'F — Geometric Architectural',
  g: 'G — Warm Editorial (Family Office)', h: 'H — Card Scroll', i: 'I — Split-Screen', j: 'J — Long-Read Essay'
};

Object.keys(R).forEach(k => {
  const el = document.querySelector(`.page-variant[data-name="${k}"]`);
  if (el) {
    el.classList.add('v-' + k);
    el.innerHTML = R[k]();
  }
});

const buttons = document.querySelectorAll('.variant-switcher button');
const variants = document.querySelectorAll('.page-variant');
const label = document.getElementById('variantLabel');

function setVariant(v) {
  buttons.forEach(b => b.classList.toggle('active', b.dataset.v === v));
  variants.forEach(s => s.classList.toggle('active', s.dataset.name === v));
  label.textContent = labels[v] || v;
  history.replaceState(null, '', '#' + v);
  window.scrollTo(0, 0);
}

buttons.forEach(b => b.addEventListener('click', () => setVariant(b.dataset.v)));

const initial = (location.hash || '#a').slice(1);
if (labels[initial]) setVariant(initial);

window.addEventListener('keydown', (e) => {
  const order = Object.keys(labels);
  const current = order.indexOf(document.querySelector('.variant-switcher button.active').dataset.v);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') setVariant(order[(current+1)%order.length]);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') setVariant(order[(current-1+order.length)%order.length]);
});
</script>
